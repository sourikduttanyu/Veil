server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/caps/ {
        proxy_pass http://cap-service:8080/;
    }

    location /api/budget/ {
        proxy_pass http://budget-manager:8081/;
    }
}
