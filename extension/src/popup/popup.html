<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>privacap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 320px; background: #0f0f11; color: #e2e2e8; }

    header { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .badge { font-size: 10px; background: #1a1a2e; color: #7c7cff; border: 1px solid #7c7cff44; padding: 2px 6px; border-radius: 4px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222; border-bottom: 1px solid #222; }
    .stat { background: #0f0f11; padding: 14px; }
    .stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-value.serve { color: #4ade80; }
    .stat-value.suppress { color: #f87171; }

    .epsilon-bar { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; }
    .epsilon-label { font-size: 11px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .bar-track { height: 4px; background: #222; border-radius: 2px; }
    .bar-fill { height: 4px; border-radius: 2px; background: linear-gradient(90deg, #7c7cff, #4ade80); transition: width 0.3s; }

    .recent { padding: 10px 16px 4px; }
    .recent-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .action-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #151515; font-size: 12px; }
    .action-row:last-child { border-bottom: none; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.serve { background: #4ade80; }
    .dot.suppress { background: #f87171; }
    .dot.budget_exhausted { background: #fbbf24; }
    .dot.unknown { background: #555; }
    .campaign { flex: 1; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .noisy { color: #666; font-size: 11px; }

    .settings { padding: 12px 16px; border-top: 1px solid #1a1a1a; }
    .settings label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
    .settings input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 6px 8px; border-radius: 4px; font-size: 12px; outline: none; }
    .settings input:focus { border-color: #7c7cff; }
    .save-btn { margin-top: 8px; width: 100%; background: #7c7cff22; border: 1px solid #7c7cff55; color: #7c7cff; padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .save-btn:hover { background: #7c7cff33; }

    .privacy-note { padding: 8px 16px 12px; font-size: 10px; color: #444; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>privacap</h1>
    <span class="badge">ε-DP active</span>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Served</div>
      <div class="stat-value serve" id="totalServed">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Suppressed</div>
      <div class="stat-value suppress" id="totalSuppressed">0</div>
    </div>
  </div>

  <div class="epsilon-bar">
    <div class="epsilon-label">
      <span>Epsilon (privacy noise)</span>
      <span id="epsilonVal">ε = 1.0</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="epsilonBar" style="width: 20%"></div>
    </div>
  </div>

  <div class="recent">
    <div class="recent-label">Recent impressions</div>
    <div id="recentList"></div>
  </div>

  <div class="settings">
    <label>Cap service URL</label>
    <input type="text" id="capServiceUrl" placeholder="http://localhost:8080" />
    <label style="margin-top:8px">Epsilon (0.1 = max privacy, 5.0 = max accuracy)</label>
    <input type="number" id="epsilon" min="0.1" max="10" step="0.1" placeholder="1.0" />
    <button class="save-btn" id="saveBtn">Save settings</button>
  </div>

  <div class="privacy-note">
    True impression counts never leave your browser.<br>
    Only calibrated noise is sent to the cap service.
  </div>

  <script src="popup.js"></script>
</body>
</html>
